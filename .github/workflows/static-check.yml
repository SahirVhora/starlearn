name: Static Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify static app files
        run: |
          test -f index.html
          test -f app.js
          test -f README.md

      - name: Check JavaScript syntax
        run: node --check app.js
